name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: Annex/Annex.xcodeproj
  SCHEME: ClubhouseGo

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Resolve simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime in sorted(data['devices'].keys(), reverse=True):
              if 'iOS' not in runtime:
                  continue
              for d in data['devices'][runtime]:
                  if 'iPhone' in d['name']:
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "DEST=platform=iOS Simulator,id=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" || true
          echo "Booted simulator: $DEVICE_ID"

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DEST" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DEST" \
            -derivedDataPath DerivedData \
            -only-testing:ClubhouseGoTests \
            -skip-testing:ClubhouseGoTests/KeychainHelperMultiInstanceTests \
            -skip-testing:ClubhouseGoTests/MTLSIdentityTests \
            -skip-testing:ClubhouseGoTests/TLSSessionDelegateTests \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 30 \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | tee xcodebuild-unit.log

      # Skipped in CI:
      #   IntegrationTests — require NWListener mock server with local network access
      #   testWelcomeScreenShowsOnFirstLaunch — pre-existing failure (onboarding state)
      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DEST" \
            -derivedDataPath DerivedData \
            -only-testing:ClubhouseGoUITests \
            -skip-testing:ClubhouseGoUITests/IntegrationTests \
            -skip-testing:ClubhouseGoUITests/ClubhouseGoUITests/testWelcomeScreenShowsOnFirstLaunch \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 30 \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | tee xcodebuild-ui.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults
            xcodebuild-*.log
          retention-days: 7
