name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: Annex/Annex.xcodeproj
  SCHEME: Annex
  DESTINATION: "platform=iOS Simulator,name=iPhone 17 Pro,OS=latest"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build & run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -only-testing:AnnexTests \
            -resultBundlePath unit-tests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild-unit.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            unit-tests.xcresult
            xcodebuild-unit.log
          retention-days: 7

  e2e-tests:
    name: E2E UI Tests
    runs-on: macos-26
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Boot simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone 17 Pro' in d['name']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Run E2E UI tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:AnnexUITests \
            -resultBundlePath e2e-tests.xcresult \
            2>&1 | tee xcodebuild-e2e.log

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-tests.xcresult
            xcodebuild-e2e.log
          retention-days: 7
